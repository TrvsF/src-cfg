// sound
snd_surround_speakers 			"0"		// "0" for built-in Miles3D headphone sound, 2/4/5/7 for speakers setup (select appropriate # of speakers)
dsp_enhance_stereo 				"0"		// "0" for software headphones surround, "1" for snd_surround_speakers 0 (normal headphone setting)
snd_spatialize_roundrobin 		"0"		// Keep at 0 for better surround sound placement/accuracy
snd_mixahead 					".06"	// Sound delay/buffer. Increase if the beginning of sounds are cut out (.05 has been known to be unstable)
dsp_water 						"0"		// Removes "underwatery" sound
snd_pitchquality 				"1"		// No reason to use 0, makes sound horrible at unsignificant FPS boost
dsp_slow_cpu 					"1"		// Helps frame, reduces noise	

// particles
tf_particles_disable_weather 	"1"		// Disable rain, snow and ash particles
mat_reduceparticles 			"1"		// Reduce number of particles, but it only helps a little bit because the real performance impact comes from creating particle systems
r_drawflecks 					"0"		// Do not create particle systems when things hit surfaces, increases FPS and reduces distractions
tf_impactwatertimeenable 		"1"		// Limit water splash particle to every second
fx_drawimpactdebris 			"0"	 	// Disable bullet surface debris effect
fx_drawimpactdust 				"0" 	// Disable bullet surface dust effect
fx_drawmetalspark 				"0"		// Disable bullet surface spark effect
mp_decals 						"30"	// Just keep this below 60ish and you shouldn't notice much different at all maybe .5 average fps for every 30-40 decals
cl_ejectbrass 					"0"		// Disables visual bullet ejection from miniguns. Causes crashes for some clients.
mat_reduceparticles 			"1"
tf_particles_disable_weather 	"0"		// Disabling weather particles

