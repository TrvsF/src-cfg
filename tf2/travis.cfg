// offline server TODO : MOVEME
sv_allow_point_servercommand 		"always"
tf_use_fixed_weaponspreads 			"1"
tf_weapon_criticals 				"0"
hud_fastswitch 						"1"
sv_cheats 							"1"

// "optimization"
host_thread_mode 					"1"			// For multicore CPU unloads (comment: on offline servers you have to set the value to "0" to move around)
mat_vsync 							"0" 		// Ensure VSync is disabled
r_fastzreject 						"0" 		// Skip outdated render method
r_occludermincount 					"2" 		// Constant count for occluders
r_norefresh 						"1" 		// Do not store a useless and unused frame time variable
mat_forcehardwaresync 				"1" 		// Skip hardware sync which is not proper on queued material system
fast_fogvolume 						"1" 		// Fast path for one leaf water data
r_pixelfog 							"1" 		// Use a pixel shader for fog if possible
mod_offline_hdr_switch 				"1" 		// Skip outdated Source engine pathways
mat_forcemanagedtextureintohardware "0" 		// Do not do tricks to render textures into hardware
r_hunkalloclightmaps 				"0" 		// Use native memory allocation
mat_requires_rt_alloc_first 		"0" 		// Force disable, since new GPUs do not need to do this. Improves load times.
sys_minidumpspewlines 				"0" 		// Do not save any console output to a memory buffer in case of a crash
cl_localnetworkbackdoor 			"0" 		// Fast path to skip backdoor
sv_logdownloadlist 					"0" 		// Disable download list logging
r_teeth 							"0" 		// Do not render teeth, small FPS boost
mat_filtertextures 					"1" 		// Smoothens textures (clearing blocky textures)
mat_mipmaptextures 					"1" 		// LOD Bias trigger (if given 0 it appears to be high textures)
mat_phong 							"0"			// Texture
mat_bumpmap 						"0"			// Color grade
mat_specular 						"0" 		// Load
tf_enable_glows_after_respawn 		"0" 		// Glowing (teleporting) effect after respawns (default 1)
mat_disable_fancy_blending 			"1" 		// Disable fancy blending of textures
mat_forceaniso 						"2"
mat_filterlightmaps 				"1"
mat_queue_mode 						"2"			//This setting determines the threading mode the material system uses. 
												//A value of -1 uses the default for your system, a value of 0 uses synchronous single thread, 
												//1 uses queued single threaded mode, and value of 2 uses multi-threaded mode. 
												//Many users report performance increases on multi-core systems when setting this variable to a value of 2."

// hud
tf_use_match_hud 					"1" 	// Shows player status up top
cl_use_tournament_specgui 			"1"		// Shows your teammate's health in tournament mode and in MvM when you're dead.
cl_ask_blacklist_opt_out 			"1"		// NO BLACKLISTING REQUESTS ON SERVERS CUZ I FUCKING HATE IT%!!!%! ~ calm down
cl_ask_favorite_opt_out 			"1"		// Disables the game annoyingly asking you if you want to favorite a server that you spend a long amount of time on.	
hud_combattext_batching 			"1"		// Batches together damage text. Useful for Pyro, Heavy, and the Engineer's Sentry in particular.
hud_combattext_batching_window 		"3.87"	// For how long the damage batches together. (in seconds)
hud_saytext_time 					"3"		// The time for the chat to disappear. (in seconds)
cl_hud_playerclass_use_playermodel 	"1"	 	// The playerclass model on the bottom left corner - 1 (activated) / 0 (disabled) +20 fps
tf_contract_progress_show 			"0"		// Removes the Contracter Progression

